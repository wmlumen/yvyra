<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><link rel="icon" href="favicon.svg" type="image/svg+xml"><link rel="alternate icon" href="favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sin conexión · EnlaceHub</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    .error-page {
      display: flex; align-items: center; justify-content: center;
      min-height: 80vh; margin-top: 20px; padding: 0 16px;
    }
    .error-card {
      max-width: 520px; width: 100%; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: inset 0 0 0 1px var(--surface-border), var(--shadow);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      border-radius: var(--radius-lg); padding: 64px 40px;
      animation: fadeInUp 0.6s var(--elastic) forwards;
    }
    .error-icon { font-size: 3rem; display: block; margin-bottom: 16px; }
    .error-code {
      font-size: 6rem; font-weight: 900; line-height: 1;
      margin: 0 0 8px; letter-spacing: -0.06em;
    }
    .error-title {
      font-size: 1.6rem; font-weight: 800; margin: 0 0 12px;
    }
    .error-desc {
      color: var(--muted); font-size: 1.05rem; line-height: 1.6;
      margin: 0 0 36px;
    }
    .error-actions {
      display: flex; gap: 12px; justify-content: center;
      flex-wrap: wrap;
    }
    .error-actions .button { min-width: 140px; }
    .offline-dot {
      display: inline-block; width: 12px; height: 12px;
      border-radius: 50%; background: #f87171;
      margin-right: 8px; vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="index.html">EnlaceHub</a>
      <nav class="nav" aria-label="Principal">
        <a href="index.html">Inicio</a>
        <a href="dashboard.html">Mi Panel</a>
        <a href="registro.html" class="button primary">Comenzar Gratis</a>
      </nav>
    </header>

    <main class="error-page">
      <div class="error-card">
        <span class="error-icon">📡</span>
        <div class="error-code holographic-text" style="font-size:4rem;">OFFLINE</div>
        <h1 class="error-title"><span class="offline-dot"></span>Sin conexión</h1>
        <p class="error-desc">
          No podemos conectar con nuestros servidores en este momento.
          Verifica tu conexión a internet o intenta de nuevo más tarde.
        </p>
        <div class="error-actions">
          <button class="button primary" onclick="location.reload()">Reconectar</button>
          <a href="index.html" class="button">Volver al Inicio</a>
        </div>
        <p style="margin-top:32px;font-size:0.85rem;color:var(--muted);">
          Si el problema persiste, escribe a <a href="mailto:soporte@enlacehub.com" style="color:var(--accent);">soporte@enlacehub.com</a>
        </p>
      </div>
    </main>
  </div>

  <script>
    // Intentar reconectar automáticamente cuando se recupere la conexión
    window.addEventListener('online', () => {
      const msg = document.createElement('div');
      msg.className = 'notice success';
      msg.textContent = '✅ Conexión restablecida. Redirigiendo...';
      msg.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;padding:12px 24px;border-radius:var(--radius-sm);background:var(--surface);backdrop-filter:blur(24px);border:1px solid var(--border);font-weight:600;';
      document.body.prepend(msg);
      setTimeout(() => window.location.reload(), 1500);
    });
  </script>
</body>
</html>
