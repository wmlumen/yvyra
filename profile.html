<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><link rel="icon" href="favicon.svg" type="image/svg+xml"><link rel="alternate icon" href="favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- SEO Básico -->
  <title>EnlaceHub - Tu Árbol de Enlaces y Servicios</title>
  <meta name="description" content="Descubre todos mis enlaces, servicios y clasificados en un solo lugar. Conecta conmigo de forma fácil y rápida a través de EnlaceHub.">
  <meta name="robots" content="index, follow">
  <meta name="author" content="EnlaceHub User">
  <link rel="canonical" href="https://tuplataforma.com/index.html">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="profile">
  <meta property="og:url" content="https://tuplataforma.com/index.html">
  <meta property="og:title" content="EnlaceHub - Tu Árbol de Enlaces y Servicios">
  <meta property="og:description" content="Descubre todos mis enlaces, servicios y clasificados en un solo lugar. Conecta conmigo de forma fácil y rápida a través de EnlaceHub.">
  <meta property="og:image" content="https://tuplataforma.com/assets/og-image-profile.jpg">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://tuplataforma.com/index.html">
  <meta property="twitter:title" content="EnlaceHub - Tu Árbol de Enlaces y Servicios">
  <meta property="twitter:description" content="Descubre todos mis enlaces, servicios y clasificados en un solo lugar. Conecta conmigo de forma fácil y rápida a través de EnlaceHub.">
  <meta property="twitter:image" content="https://tuplataforma.com/assets/og-image-profile.jpg">

  <!-- Datos Estructurados (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfilePage",
    "mainEntity": {
      "@type": "Person",
      "name": "EnlaceHub User",
      "description": "Descubre todos mis enlaces, servicios y clasificados en un solo lugar.",
      "url": "https://tuplataforma.com/index.html"
    }
  }
  </script>

  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <main class="profile-page" aria-labelledby="profile-name">
    <section class="profile-hero-card">
      <div class="hero-bg" id="hero-bg" aria-hidden="true"></div>
      <div class="hero-overlay" aria-hidden="true"></div>
      <div class="avatar" id="avatar" aria-hidden="true">EH</div>
      <h1 id="profile-name">EnlaceHub</h1>
      <p class="handle" id="handle"></p>
      <p class="bio" id="bio"></p>
      <p class="profile-intro muted" id="profile-intro" hidden></p>
      <nav class="social-strip" id="social-strip" aria-label="Redes sociales" hidden></nav>
      <div class="identity-strip" id="identity-strip" aria-label="Datos de identidad" hidden></div>
      <div class="actions centered-actions">
        <button class="button primary icon-btn" id="whatsapp-share-button" type="button" aria-label="Compartir por WhatsApp">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l1.65-3.8a9 9 0 1 1 3.4 2.9L3 21"/><path d="M9 10a.5.5 0 0 0 1 0V9a.5.5 0 0 0-1 0v1a5 5 0 0 0 5 5h1a.5.5 0 0 0 0-1h-1a.5.5 0 0 0 0 1"/></svg>
        </button>
        <button class="button" id="share-button" type="button">Compartir página</button>
        <a class="button" id="direct-contact-button" href="#" hidden>Contacto directo</a>
        <button class="button" id="download-contact-button" type="button" hidden>Guardar contacto</button>
        <a class="button" href="dashboard.html">Editar demo</a>
      </div>
    </section>

    <section class="profile-sections-card" aria-labelledby="profile-sections-title">
      <div class="profile-section-head">
        <div>
          <p class="eyebrow">Explora tu perfil</p>
          <h2 id="profile-sections-title">Hojas y accesos directos</h2>
        </div>
        <div class="sheet-controls">
          <button class="button" id="sheet-prev" type="button" aria-label="Hoja anterior">←</button>
          <button class="button" id="sheet-next" type="button" aria-label="Hoja siguiente">→</button>
        </div>
      </div>
      <div class="sheet-tab-list" id="sheet-tab-list" aria-label="Navegación de hojas"></div>
      <div class="sheet-stage" id="sheet-stage" aria-live="polite"></div>
      <div class="sheet-dots" id="sheet-dots" aria-hidden="true"></div>
      <div class="scroll-links" id="scroll-links"></div>
    </section>

    <section class="profile-stack" id="profile-stack" aria-label="Contenido del perfil"></section>

    <section class="profile-sections-card" aria-labelledby="hub-title">
      <div class="profile-section-head">
        <div>
          <p class="eyebrow">Hub principal</p>
          <h2 id="hub-title">Explora este espacio</h2>
        </div>
      </div>
      <div class="hub-grid" id="hub-grid"></div>
    </section>

    <section class="connected-products" aria-label="Páginas conectadas">
      <a class="button" id="mini-site-link" href="miniweb.html">Página web básica</a>
      <a class="button" id="classifieds-link" href="clasificados.html">Ver clasificados</a>
    </section>
  </main>
  <footer>Demo original de árbol de enlaces · Datos guardados localmente</footer>
  <script type="module" src="src/public.mjs"></script>
</body>
</html>
