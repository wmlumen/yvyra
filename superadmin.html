<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"><link rel="icon" href="favicon.svg" type="image/svg+xml"><link rel="alternate icon" href="favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro de Control Superadmin</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script type="module" src="src/superadmin.mjs"></script>
</head>
<body data-theme="dark">
  <div class="shell">
    <header class="topbar">
      <a href="#" class="brand">👑 Superadmin Global</a>
      <nav class="nav">
        <a href="dashboard.html">Volver al Panel</a>
        <button id="logout-btn" class="danger">Cerrar Sesión</button>
      </nav>
    </header>
    
    <main class="grid" style="grid-template-columns: 1fr; padding-top: 40px;">
      <section class="card" style="margin-bottom: 40px;">
        <h2>Métricas Globales</h2>
        <div id="admin-stats" class="metric-grid">
          <div class="metric"><strong>...</strong><span>Usuarios</span></div>
          <div class="metric"><strong>...</strong><span>Subdominios</span></div>
          <div class="metric"><strong>...</strong><span>Bloques</span></div>
          <div class="metric"><strong>...</strong><span>Clasificados</span></div>
        </div>
      </section>

      <div id="admin-message" hidden></div>

      <section class="card">
        <div id="tab-bar" class="tabs" style="display:flex; gap:4px; margin-bottom:16px;"></div>
        <div id="panel-container"></div>
      </section>
    </main>
  </div>
</body>
</html>
