<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro · EnlaceHub</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-theme="dark">
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="index.html">✨ EnlaceHub</a>
      <nav class="nav" aria-label="Principal">
        <a href="pricing.html">Precios</a>
        <a href="templates.html">Plantillas</a>
        <a href="login.html" class="button">Iniciar Sesión</a>
      </nav>
    </header>
    <main class="auth-page">
      <section class="card auth-card">
        <h1 class="holographic-text">Crea tu cuenta</h1>
        <p class="muted">Reclama tu espacio en la plataforma</p>
        <form id="register-form" class="stack" style="text-align: left; margin-top: 32px;">
          <div class="form-row">
            <label for="name">Tu nombre o negocio</label>
            <input id="name" required placeholder="Ej. Orlando Velez">
          </div>
          <div class="form-row">
            <label for="subdomain">Reserva tu enlace público</label>
            <div class="domain-preview">
              <input id="subdomain" required pattern="[a-z0-9][a-z0-9-]{1,46}[a-z0-9]" placeholder="orlando">
              <span class="suffix">.enlacehub.com</span>
            </div>
            <small class="muted">Usa minúsculas, números y guiones.</small>
          </div>
          <div class="form-row">
            <label for="email">Correo electrónico</label>
            <input id="email" type="email" required placeholder="tu@correo.com">
          </div>
          <div class="form-row">
            <label for="password">Contraseña</label>
            <input id="password" type="password" required minlength="6">
          </div>
          <button class="button primary" type="submit" style="width: 100%; min-height: 54px; font-size: 1.1rem;">Crear Cuenta</button>
          <p id="register-message" class="notice" hidden></p>
        </form>
        <p style="margin-top: 32px; color: var(--muted);">¿Ya tienes cuenta? <a href="login.html" style="color: var(--accent); font-weight: bold;">Inicia sesión</a>.</p>
      </section>
    </main>
  </div>
  <script type="module">
    import { register } from './src/auth.mjs';
    import { normalizeSubdomain } from './src/core.mjs';

    const subInput = document.getElementById('subdomain');
    subInput.addEventListener('input', () => {
      subInput.value = normalizeSubdomain(subInput.value);
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const subdomain = subInput.value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('register-message');

      try {
        await register(email, password, name, subdomain);
        window.location.href = 'dashboard.html';
      } catch (err) {
        msg.textContent = err.message || 'Error al registrarse';
        msg.hidden = false;
        msg.className = 'notice error';
      }
    });
  </script>
</body>
</html>
