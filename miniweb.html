  <!-- SEO Básico -->
  <title>Negocio Local · EnlaceHub</title>
  <script>
  // Redirigir a la versión renderizada en servidor si hay tenant
  (function() {
    var p = new URLSearchParams(location.search);
    var t = p.get('tenant') || p.get('profile') || p.get('subdomain');
    if (t) { location.replace('/api/minisite/render?tenant=' + encodeURIComponent(t)); }
  })();
  </script>

<body data-theme="dark">
  <header class="shell topbar">
    <a class="brand" href="index.html">EnlaceHub</a>
