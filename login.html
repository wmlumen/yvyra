<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><link rel="icon" href="favicon.svg" type="image/svg+xml"><link rel="alternate icon" href="favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar Sesión · EnlaceHub</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-theme="dark">
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="index.html">✨ EnlaceHub</a>
      <nav class="nav" aria-label="Principal">
        <a href="pricing.html">Precios</a>
        <a href="templates.html">Plantillas</a>
        <a href="registro.html" class="button primary">Comenzar Gratis</a>
      </nav>
    </header>
    <main class="auth-page">
      <section class="card auth-card">
        <h1 class="holographic-text">Bienvenido de nuevo</h1>
        <p class="muted">Ingresa a tu panel de control</p>
        <form id="login-form" class="stack" style="text-align: left; margin-top: 32px;">
          <div class="form-row">
            <label for="email">Correo electrónico</label>
            <input id="email" type="email" required placeholder="tu@correo.com">
          </div>
          <div class="form-row">
            <label for="password">Contraseña</label>
            <input id="password" type="password" required>
          </div>
          <button class="button primary" type="submit" style="width: 100%; min-height: 54px; font-size: 1.1rem;">Iniciar Sesión</button>
          <p id="login-message" class="notice" hidden></p>
        </form>
        <p style="margin-top: 32px; color: var(--muted);">¿No tienes cuenta? <a href="registro.html" style="color: var(--accent); font-weight: bold;">Regístrate aquí</a>.</p>
      </section>
    </main>
  </div>
  <script type="module">
    import { login } from './src/auth.mjs';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('login-message');

      try {
        await login(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        msg.textContent = err.message || 'Error al iniciar sesión';
        msg.hidden = false;
        msg.className = 'notice error';
      }
    });
  </script>
</body>
</html>
